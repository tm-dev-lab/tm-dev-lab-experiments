spring.application.name=digital-bank

# Tomcat (classic blocking, thread-per-request) sized for I/O-bound concurrency.
server.tomcat.threads.max=${BANK_TOMCAT_MAX_THREADS:200}

# Workload knobs (overridable via environment so the run matrix can vary them).
# Per-request simulated downstream I/O latency (ms): parks the request thread -> I/O-bound profile.
bank.io-delay-ms=${BANK_IO_DELAY_MS:5}
# Warm working set retained on the heap so memory sizing/GC actually matter.
bank.preload-accounts=${BANK_PRELOAD_ACCOUNTS:100000}
bank.preload-tx-per-account=${BANK_PRELOAD_TX:8}

# Actuator: health probe + JVM memory/GC metrics for collection.
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
